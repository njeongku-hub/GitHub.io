<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>스마트 할일 캘린더</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#d0d4db;color:#333;font-size:14px}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:#fff;border-bottom:1px solid #ccc;position:sticky;top:0;z-index:10}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr h1{font-size:1.15rem;font-weight:700;color:#2c3e50}
.sync-pill{font-size:.68rem;padding:2px 8px;border-radius:10px;font-weight:600}
.sync-pill.on{background:#e8f8f0;color:#27ae60}
.sync-pill.off{background:#fdecea;color:#e74c3c}
.sync-pill.wait{background:#fef9e7;color:#f39c12}
.nav-btn{background:none;border:1px solid #ddd;border-radius:6px;padding:5px 12px;cursor:pointer;font-size:1rem;color:#555}
.nav-btn:hover{background:#f0f0f0}
.summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:14px}
.sec{background:#fff;border-radius:10px;padding:13px;border-top:3px solid;min-height:110px}
.sec.ov{border-color:#e74c3c}.sec.td{border-color:#3498db}.sec.up{border-color:#27ae60}
.sec h3{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:9px}
.sec.ov h3{color:#e74c3c}.sec.td h3{color:#3498db}.sec.up h3{color:#27ae60}
.ti{display:flex;align-items:flex-start;gap:7px;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:.82rem}
.ti:last-child{border-bottom:none}
.ti.dn .ti-ttl{text-decoration:line-through;opacity:.5}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ti-body{flex:1;min-width:0}
.ti-ttl{display:block}
.ti-sub{font-size:.7rem;color:#aaa;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.td-lbl{font-size:.7rem;color:#aaa;white-space:nowrap;margin-left:4px;margin-top:2px}
.empty-msg{color:#ccc;font-size:.78rem;padding:6px 0}
.cal{padding:0 14px 16px}
.grid7{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.dlbl{text-align:center;padding:7px 0;font-size:.7rem;font-weight:600;color:#888}
.dc{background:#fff;border-radius:7px;min-height:82px;padding:6px;cursor:pointer;transition:box-shadow .15s;position:relative}
.dc:hover{box-shadow:0 2px 10px rgba(0,0,0,.15)}

.dc.tod .dn2{color:#3498db;font-weight:700}

.hol-name{font-size:.62rem;color:#e74c3c;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.allday-strip{font-size:.63rem;padding:1px 4px;border-radius:3px;background:#fff3cd;color:#856404;border-left:2px solid #ffc107;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.chip.dne{background:#f0f0f0!important;color:#bbb;text-decoration:line-through}

.badge{position:absolute;top:4px;right:4px;font-size:.6rem;background:#e74c3c;color:#fff;border-radius:10px;padding:1px 5px}
.repeat-dot{font-size:.6rem;color:#8e44ad;margin-left:2px}
.ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;justify-content:center;align-items:center}
.ovl.on{display:flex}
.pop{background:#fff;border-radius:14px;width:440px;max-height:86vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.2)}

.pop-hdr h2{font-size:1rem;font-weight:700}

.xbtn{background:none;border:none;font-size:1.4rem;cursor:pointer;color:#aaa;line-height:1}
.pop-body{overflow-y:auto;flex:1}

.add-allday-btn{background:#ffc107;border:none;border-radius:12px;padding:3px 10px;font-size:.72rem;font-weight:600;cursor:pointer;color:#333}

.tform-time{font-size:.78rem;color:#888;background:#f4f6f9;padding:3px 9px;border-radius:12px}

.bp{background:#3498db;color:#fff}.bp:hover{background:#2980b9}
.bs{background:#f0f0f0;color:#555}.bs:hover{background:#e0e0e0}
</style>
</head>
<body>

<div class="hdr">

<!-- 설정 모달 -->

    </div>

      <button class="btn bs" onclick="closeSettings()">취소</button>
      <button class="btn bp" onclick="saveApiKey()">저장</button>

</div>

<div class="summary">
  <div class="sec ov"><h3>⚠️ 지난주 미완료</h3><div id="s-ov"></div></div>
  <div class="sec td"><h3>📌 오늘 할 일</h3><div id="s-td"></div></div>

      <div class="map-links">
        <a class="ml ml-g" id="ml-g" href="#" target="_blank">Google Maps</a>
        <a class="ml ml-k" id="ml-k" href="#" target="_blank">카카오맵</a>
        <a class="ml ml-n" id="ml-n" href="#" target="_blank">네이버지도</a>

      <button class="btn bp" onclick="saveTsk()">저장</button>

<script>
// ── API 키 — 기기 로컬 저장 ──
function getApiKey(){return localStorage.getItem('anthropic_api_key')||'';}
function openSettings(){
  document.getElementById('api-key-input').value=getApiKey();
  document.getElementById('settings-mod').classList.add('on');
}
function closeSettings(e){
  if(e&&e.target.id!=='settings-mod')return;
  document.getElementById('settings-mod').classList.remove('on');
}
function saveApiKey(){
  const key=document.getElementById('api-key-input').value.trim();
  if(key) localStorage.setItem('anthropic_api_key',key);
  else localStorage.removeItem('anthropic_api_key');
  closeSettings();
  alert(key?'✅ API 키가 저장되었습니다!':'API 키가 삭제되었습니다.');
}

// ── Firebase REST API ──
const FB_PROJECT="my-calendar-ebffd";
const FB_KEY="AIzaSyC8LBPGgESSYkP8sXus7EkmwvnDMtDXPT0";
const FB_BASE=`https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents`;

function toFS(v){
  if(v===null||v===undefined)return{nullValue:null};
  if(typeof v==='boolean')return{booleanValue:v};
  if(typeof v==='number')return Number.isInteger(v)?{integerValue:String(v)}:{doubleValue:v};
  if(typeof v==='string')return{stringValue:v};
  if(Array.isArray(v))return{arrayValue:{values:v.length?v.map(toFS):[]}};
  if(typeof v==='object')return{mapValue:{fields:Object.fromEntries(Object.entries(v).map(([k,val])=>[k,toFS(val)]))}};
  return{stringValue:String(v)};
}
function fromFS(v){
  if(!v)return null;
  if('nullValue'in v)return null;
  if('booleanValue'in v)return v.booleanValue;
  if('integerValue'in v)return parseInt(v.integerValue);
  if('doubleValue'in v)return v.doubleValue;
  if('stringValue'in v)return v.stringValue;
  if('arrayValue'in v)return(v.arrayValue.values||[]).map(fromFS);
  if('mapValue'in v)return Object.fromEntries(Object.entries(v.mapValue.fields||{}).map(([k,val])=>[k,fromFS(val)]));
  return null;
}
async function fbSet(col,doc,data){
  try{
    const fields=Object.fromEntries(Object.entries(data).map(([k,v])=>[k,toFS(v)]));
    const r=await fetch(`${FB_BASE}/${col}/${doc}?key=${FB_KEY}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({fields})});
    return r.ok;
  }catch(e){return false;}
}
async function fbList(col){
  try{
    const r=await fetch(`${FB_BASE}/${col}?key=${FB_KEY}`);if(!r.ok)return{};
    const d=await r.json();const result={};
    (d.documents||[]).forEach(doc=>{const id=doc.name.split('/').pop();result[id]=fromFS({mapValue:{fields:doc.fields}});});
    return result;
  }catch(e){return{};}
}
// ── localStorage 백업 ──
function lsSave(){
  try{
    localStorage.setItem('cal_tasks_backup', JSON.stringify(tasks));
    localStorage.setItem('cal_allday_backup', JSON.stringify(allday));
  }catch(e){}
}
function lsLoad(){
  try{
    const t=localStorage.getItem('cal_tasks_backup');
    const a=localStorage.getItem('cal_allday_backup');
    if(t) Object.assign(tasks, JSON.parse(t));
    if(a) Object.assign(allday, JSON.parse(a));
  }catch(e){}
}

async function fbSave(type,date){

const REPEAT_LABELS={none:'',daily:'매일',every2days:'격일',weekly:'매주',biweekly:'격주',every4weeks:'매 4주',monthly:'매월',bimonthly:'격월'};

function getRepeatDates(startDate, repeat){
  const dates=[];
  if(!repeat||repeat==='none')return dates;
  const start=new Date(startDate);
  const end=new Date(startDate);
  end.setMonth(end.getMonth()+6); // 6개월
  let cur=new Date(start);
  cur.setDate(cur.getDate()); // 시작일 제외하고 다음부터
  while(true){
    if(repeat==='daily') cur.setDate(cur.getDate()+1);
    else if(repeat==='every2days') cur.setDate(cur.getDate()+2);
    else if(repeat==='weekly') cur.setDate(cur.getDate()+7);
    else if(repeat==='biweekly') cur.setDate(cur.getDate()+14);
    else if(repeat==='every4weeks') cur.setDate(cur.getDate()+28);
    else if(repeat==='monthly') cur.setMonth(cur.getMonth()+1);
    else if(repeat==='bimonthly') cur.setMonth(cur.getMonth()+2);
    if(cur>end) break;
    dates.push(fd(cur));
  }
  return dates;
}

async function saveTsk(){
  const ttl=document.getElementById('t-ttl').value.trim();if(!ttl)return;
  const c=document.getElementById('t-cat').value;
  const loc=document.getElementById('t-loc').value.trim();
  const memo=document.getElementById('t-memo').value.trim();
  const repeat=document.getElementById('t-repeat').value;

  if(mMode==='add-ad'){
    if(!allday[aDate])allday[aDate]=[];
    const newAdTask={id:`ad_${Date.now()}`,ttl,c,dn:false,memo,repeat};
    allday[aDate].push(newAdTask);
    await fbSave('allday',aDate);
    // 하루종일 반복 일정 생성
    if(repeat&&repeat!=='none'){
      const repDates=getRepeatDates(aDate,repeat);
      for(const rd of repDates){
        if(!allday[rd])allday[rd]=[];
        allday[rd].push({...newAdTask,id:`ad_${Date.now()}_${rd}`,dn:false});
        await fbSave('allday',rd);
      }
    }
    renderAlldayList();
  }else if(mMode==='edit-ad'){
    const t=(allday[aDate]||[]).find(t=>t.id===editId);
    if(t){t.ttl=ttl;t.c=c;t.memo=memo;t.repeat=repeat;}
    fbSave('allday',aDate);renderAlldayList();
  }else if(mMode==='add'){
    const newTask={id:`${Date.now()}`,ttl,tm:aTime,c,dn:false,memo,loc,repeat};
    if(!tasks[aDate])tasks[aDate]=[];
    tasks[aDate].push(newTask);
    tasks[aDate].sort((a,b)=>(a.tm||'').localeCompare(b.tm||''));
    await fbSave('tasks',aDate);
    // 반복 일정 생성
    if(repeat&&repeat!=='none'){
      const repDates=getRepeatDates(aDate,repeat);
      for(const rd of repDates){
        const rid=`${Date.now()}_${rd}`;
        if(!tasks[rd])tasks[rd]=[];
        tasks[rd].push({...newTask,id:rid,dn:false});
        tasks[rd].sort((a,b)=>(a.tm||'').localeCompare(b.tm||''));
        await fbSave('tasks',rd);
      }
    }
    renderSlots();
  }else{
    const newDate=document.getElementById('t-date').value||aDate;
    const newTime=document.getElementById('t-time').value||aTime;
    if(newDate!==aDate||newTime!==aTime){
      if(tasks[aDate])tasks[aDate]=tasks[aDate].filter(t=>t.id!==editId);
      fbSave('tasks',aDate);
      if(!tasks[newDate])tasks[newDate]=[];
      tasks[newDate].push({id:editId,ttl,tm:newTime,c,dn:false,memo,loc,repeat});
      tasks[newDate].sort((a,b)=>(a.tm||'').localeCompare(b.tm||''));
      fbSave('tasks',newDate);
      aDate=newDate;aTime=newTime;
    }else{
      const t=(tasks[aDate]||[]).find(t=>t.id===editId);
      if(t){t.ttl=ttl;t.c=c;t.memo=memo;t.loc=loc;t.repeat=repeat;}
      fbSave('tasks',aDate);
    }
    renderSlots();
  }
  closeMod();renderSum();renderCal();
}
function toggleDn(ds,id){const t=(tasks[ds]||[]).find(t=>t.id===id);if(t){t.dn=!t.dn;fbSave('tasks',ds);}renderSlots();renderSum();renderCal();}
function delTsk(ds,id){if(tasks[ds]){tasks[ds]=tasks[ds].filter(t=>t.id!==id);fbSave('tasks',ds);}renderSlots();renderSum();renderCal();}

// ── AI ──
async function aiSuggest(){
  const ttl=document.getElementById('t-ttl').value.trim()||'(미입력)';
  const loc=document.getElementById('t-loc').value.trim();
  const memo=document.getElementById('t-memo').value.trim();
  const isAD=mMode==='add-ad'||mMode==='edit-ad';
  const dep=depMode==='home'?HOME_FULL:(curLat?`현재위치(${curLat.toFixed(4)},${curLng.toFixed(4)})`:'현재위치(미확인)');
  const air=document.getElementById('ai-r');
  air.className='air on ld';air.textContent='✨ AI가 준비 중입니다...';
  document.getElementById('ai-app').className='air-app';
  const hasKey=getApiKey()&&getApiKey().startsWith('sk-');
  if(!hasKey){air.className='air on';air.textContent='⚠️ API 키가 없습니다. 우측 상단 ⚙️ 버튼을 눌러 키를 입력해 주세요.';return;}
  try{
    const locPart=loc?`\n장소: ${loc}\n출발지: ${dep}\n→ 이동수단별 예상 이동시간과 권장 출발 시각도 포함해주세요.`:'';
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':getApiKey(),
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-opus-4-5',
        max_tokens:1000,
        messages:[{role:'user',content:
`할 일: "${ttl}"
날짜: ${aDate}${isAD?' (하루 종일 일정)':`, 시간: ${aTime}`}
현재 메모: "${memo||'없음'}"${locPart}
한국어로 간결하게 제안해주세요:
1. 실행 팁
2. ${isAD?'하루 일정 구성 제안':'예상 소요 시간'}
3. 준비사항 또는 주의점${loc?'\n4. 이동 방법 및 예상 시간\n5. 권장 출발 시각':''}`}]
      })
    });
    const data=await res.json();
    if(data.error){
      air.className='air on';
      air.textContent=`⚠️ API 오류: ${data.error.type} — ${data.error.message}`;
      return;
    }
    const txt=data.content?.find(c=>c.type==='text')?.text||'제안을 가져올 수 없습니다.';
    air.className='air on';air.textContent=txt;
    document.getElementById('ai-app').className='air-app on';
  }catch(e){
    air.className='air on';air.textContent=`⚠️ 연결 오류: ${e.message}`;
  }
}
function appendAI(){
  const el=document.getElementById('t-memo');
  const txt=document.getElementById('ai-r').textContent;
  const now=new Date().toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
  el.value+=(el.value?'\n\n':'')+`[AI 팁 ${now}]\n${txt}`;
  document.getElementById('ai-app').className='air-app';
  el.scrollTop=el.scrollHeight;
}

render();
</script>
