<script>
// вФАвФА Firebase REST API мД§м†Х вФАвФА
const FB_PROJECT = "my-calendar-ebffd";
const FB_KEY     = "AIzaSyC8LBPGgESSYkP8sXus7EkmwvnDMtDXPT0";
const FB_BASE    = `https://firestore.googleapis.com/v1/projects/${FB_PROJECT}/databases/(default)/documents`;

// вФАвФА Firestore нШХмЛЭ л≥АнЩШ вФАвФА
function toFS(v){
  if(v===null||v===undefined) return {nullValue:null};
  if(typeof v==='boolean') return {booleanValue:v};
  if(typeof v==='number') return Number.isInteger(v)?{integerValue:String(v)}:{doubleValue:v};
  if(typeof v==='string') return {stringValue:v};
  if(Array.isArray(v)) return {arrayValue:{values:v.length?v.map(toFS):[]}};
  if(typeof v==='object') return {mapValue:{fields:Object.fromEntries(Object.entries(v).map(([k,val])=>[k,toFS(val)]))}};
  return {stringValue:String(v)};
}
function fromFS(v){
  if(!v) return null;
  if('nullValue' in v) return null;
  if('booleanValue' in v) return v.booleanValue;
  if('integerValue' in v) return parseInt(v.integerValue);
  if('doubleValue' in v) return v.doubleValue;
  if('stringValue' in v) return v.stringValue;
  if('arrayValue' in v) return (v.arrayValue.values||[]).map(fromFS);
  if('mapValue' in v) return Object.fromEntries(Object.entries(v.mapValue.fields||{}).map(([k,val])=>[k,fromFS(val)]));
  return null;
}

// вФАвФА Firebase CRUD вФАвФА
async function fbGet(col, doc){
  try{
    const r = await fetch(`${FB_BASE}/${col}/${doc}?key=${FB_KEY}`);
    if(!r.ok) return null;
    const d = await r.json();
    return d.fields ? fromFS({mapValue:{fields:d.fields}}) : null;
  }catch(e){return null;}
}
async function fbSet(col, doc, data){
  try{
    const fields = Object.fromEntries(Object.entries(data).map(([k,v])=>[k,toFS(v)]));
    const r = await fetch(`${FB_BASE}/${col}/${doc}?key=${FB_KEY}`, {
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({fields})
    });
    return r.ok;
  }catch(e){return false;}
}
async function fbList(col){
  try{
    const r = await fetch(`${FB_BASE}/${col}?key=${FB_KEY}`);
    if(!r.ok) return {};
    const d = await r.json();
    const result = {};
    (d.documents||[]).forEach(doc=>{
      const id = doc.name.split('/').pop();
      const obj = fromFS({mapValue:{fields:doc.fields}});
      result[id] = obj;
    });
    return result;
  }catch(e){return {};}
}

async function fbSave(type, date){
  const data = type==='tasks'?(tasks[date]||[]):(allday[date]||[]);
  const ok = await fbSet(type==='tasks'?'cal_tasks':'cal_allday', date, {items:data});
  if(ok) setSyncStatus('on'); else setSyncStatus('off');
}

async function fbLoadAll(){
  setSyncStatus('wait');
  try{
    const [t, a] = await Promise.all([fbList('cal_tasks'), fbList('cal_allday')]);
    Object.entries(t).forEach(([date,obj])=>{ if(obj&&obj.items) tasks[date]=obj.items; });
    Object.entries(a).forEach(([date,obj])=>{ if(obj&&obj.items) allday[date]=obj.items; });
    setSyncStatus('on');
  }catch(e){
    setSyncStatus('off');
  }
  render();
  if(isPopOpen()){renderSlots();renderAlldayList();}
}

  const ov=[],td=[],up=[];

  for(let i=1;i<=3;i++){const d=addD(TODAY,i);(tasks[d]||[]).forEach(t=>up.push({...t,date:d}));(allday[d]||[]).forEach(t=>up.push({...t,date:d,tm:'нХШл£®мҐЕмЭЉ'}))}

    const el=document.getElementById(id);
    if(!arr.length){el.innerHTML='<div class="empty-msg">нХ≠л™© мЧЖмЭМ</div>';return}
    el.innerHTML=arr.map(t=>`<div class="ti${t.dn?' dn':''}">

}
function renderCal(){
  const body=document.getElementById('cal-body');
  const first=new Date(curY,curM,1),last=new Date(curY,curM+1,0);
  let cells=[];
  for(let i=0;i<first.getDay();i++)cells.push(null);
  for(let d=1;d<=last.getDate();d++)cells.push(new Date(curY,curM,d));
  while(cells.length%7!==0)cells.push(null);
  body.innerHTML=cells.map(d=>{
    if(!d)return'<div class="dc emp"></div>';
    const ds=fd(d),dt=tasks[ds]||[],ad=allday[ds]||[];
    const isT=ds===TODAY,isPast=ds<TODAY;
    const isSu=d.getDay()===0,isSa=d.getDay()===6;
    const hol=HOLIDAYS[ds];
    const odCnt=isPast&&!isT?dt.filter(t=>!t.dn).length:0;
    const adStrips=ad.slice(0,1).map(t=>`<div class="allday-strip">${t.dn?'вЬУ ':''}${t.ttl}</div>`).join('');
    const chips=dt.slice(0,2).map(t=>{
      const isOD=isPast&&!isT&&!t.dn;
      return `<div class="chip ${t.dn?'dne':''} ${isOD?'ovc':''}" style="background:${isOD?'':CB[t.c]};color:${isOD?'':CC[t.c]};border-color:${CC[t.c]}">${t.tm?t.tm.slice(0,5)+' ':''}${t.loc?'рЯУН ':''}${t.ttl}</div>`;
    }).join('');
    const total=dt.length+ad.length;
    return `<div class="dc${isT?' tod':''}${hol?' hol':''}" ${isSu?'data-s':''} ${isSa?'data-sa':''} onclick="openPop('${ds}')">
      <div class="dn2">${d.getDate()}</div>
      ${hol?`<div class="hol-name">рЯЗ∞рЯЗЈ ${hol}</div>`:''}
      ${adStrips}
      <div class="chips">${chips}${total>2?`<div class="more">+${total-2}к∞Ь</div>`:''}</div>
      ${odCnt?`<div class="badge">${odCnt}</div>`:''}
    </div>`;
  }).join('');
}

  const now=new Date().toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
  el.value+=(el.value?'\n\n':'')+`[AI нМБ ${now}]\n${txt}`;
  document.getElementById('ai-app').className='air-app';
  el.scrollTop=el.scrollHeight;
}

render();
</script>
</body>
